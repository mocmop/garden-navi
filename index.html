<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">

  <!-- iOS PWA設定 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ガーデンナビ">

  <!-- アイコン -->
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">

  <!-- テーマカラー -->
  <meta name="theme-color" content="#88b890">

  <title>ガーデンナビ</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #fdf9f0;
      -webkit-tap-highlight-color: transparent;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    /* ロード中の表示 */
    .splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fdf9f0;
      z-index: 100;
      transition: opacity 0.4s;
      font-family: -apple-system, sans-serif;
      color: #5a8c66;
    }
    .splash.hidden { opacity: 0; pointer-events: none; }
    .splash-icon { font-size: 4rem; margin-bottom: 0.5rem; }
    .splash-text { font-size: 1.1rem; font-weight: 600; }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <div class="splash-icon">🌷</div>
    <div class="splash-text">ガーデンナビ</div>
  </div>
  <iframe
    id="app"
    src="https://script.google.com/macros/s/AKfycby0e6HqjoKIlZ2vvGIVnr8iUb_-XzTf0ESvwIdwDk6siMWuKzGuxpSWezneys2on7WRxQ/exec"
    allow="clipboard-read; clipboard-write"
    onload="document.getElementById('splash').classList.add('hidden')">
  </iframe>
</body>
</html>
