<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- iOS PWA設定 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ガーデンナビ">

  <!-- アイコン -->
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">

  <!-- テーマカラー -->
  <meta name="theme-color" content="#88b890">

  <title>ガーデンナビ</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100%;
      background: #fdf9f0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .icon {
      font-size: 5rem;
      margin-bottom: 0.5rem;
      animation: bounce 2s infinite ease-in-out;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    h1 {
      color: #5a8c66;
      margin: 0 0 0.5rem;
      font-size: 1.6rem;
      font-weight: 800;
    }
    .subtitle {
      color: #9a8a78;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .open-btn {
      display: inline-block;
      background: #88b890;
      color: #fff;
      padding: 0.85rem 2rem;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 3px 0 #5a8c66;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .open-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #5a8c66;
    }
    .loading {
      color: #9a8a78;
      font-size: 0.85rem;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌷</div>
    <h1>ガーデンナビ</h1>
    <div class="subtitle">栽培サイクル管理 ＆ 成長日記</div>
    <a href="https://script.google.com/macros/s/AKfycbyFlhlA1XBlKKBYrCvcaW_LGwayfvUmZyG4ymuSteeU0ZGLXls5SCsJ0X2uxFP8JR8HwA/exec" class="open-btn" id="openBtn">アプリを開く 🌱</a>
    <div class="loading" id="loadingMsg" style="display:none">自動的に開いています...</div>
  </div>

  <script>
    const APP_URL = 'https://script.google.com/macros/s/AKfycbyFlhlA1XBlKKBYrCvcaW_LGwayfvUmZyG4ymuSteeU0ZGLXls5SCsJ0X2uxFP8JR8HwA/exec';

    // ホーム画面から起動された場合は自動リダイレクト
    const isStandalone = window.navigator.standalone === true ||
                         window.matchMedia('(display-mode: standalone)').matches;

    if (isStandalone) {
      document.getElementById('loadingMsg').style.display = 'block';
      // 0.5秒後に自動遷移（アイコンを一瞬見せるため）
      setTimeout(() => {
        window.location.href = APP_URL;
      }, 500);
    }
  </script>
</body>
</html>
